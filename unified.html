<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CDMD Companion</title>

    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: #000; font-family: sans-serif; 
            overscroll-behavior-y: contain; 
        }

        .main-container { display: flex; flex-direction: row; width: 100vw; height: 100vh; }
        .app-wrapper { position: relative; flex-grow: 1; height: 100%; }

        .nav-bar {
            display: flex; flex-direction: column; background: #0a0a0a; 
            border-left: 2px solid #222; width: 70px; height: 100%;
            z-index: 100; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            flex: 1; border: none; background: none; cursor: pointer; transition: all 0.3s ease;
            border-left: 4px solid transparent; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #444; padding: 10px;
        }

        .nav-btn .material-icons { font-size: 32px; margin-bottom: 4px; }
        .nav-btn span.label { font-family: 'MedievalSharp', cursive; font-size: 0.65em; text-transform: uppercase; }

        /* --- ACTIVE STATES --- */
        .btn-grid.active { color: #ffcf67; border-left-color: #ffcf67; background: linear-gradient(to right, rgba(255, 207, 103, 0.1), transparent); }
        .btn-invest.active { color: #4682B4; border-left-color: #4682B4; background: linear-gradient(to right, rgba(70, 130, 180, 0.1), transparent); }
        .btn-dice.active { color: #2ecc71; border-left-color: #2ecc71; background: linear-gradient(to right, rgba(46, 204, 113, 0.1), transparent); }
        
        /* NEW PURPLE MUSIC TAB */
        .btn-music.active { 
            color: #a29bfe; 
            border-left-color: #a29bfe; 
            background: linear-gradient(to right, rgba(162, 155, 254, 0.1), transparent); 
        }

        .app-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; visibility: hidden; opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .app-frame.active { visibility: visible; opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="app-wrapper">
            <iframe src="boss-scenario.htm" id="gridFrame" class="app-frame active"></iframe>
            <iframe src="investigators.htm" id="investFrame" class="app-frame"></iframe>
            <iframe src="dice.htm" id="diceFrame" class="app-frame"></iframe>
            <iframe src="music.htm" id="musicFrame" class="app-frame"></iframe>
        </div>

        <nav class="nav-bar">
            <button id="btnGrid" class="nav-btn btn-grid active" onclick="switchApp('grid')">
                <span class="material-icons">map</span>
                <span class="label">Grid</span>
            </button>
            <button id="btnInvest" class="nav-btn btn-invest" onclick="switchApp('invest')">
                <span class="material-icons">groups</span>
                <span class="label">Heroes</span>
            </button>
            <button id="btnDice" class="nav-btn btn-dice" onclick="switchApp('dice')">
                <span class="material-icons">casino</span>
                <span class="label">Dice</span>
            </button>
            <button id="btnMusic" class="nav-btn btn-music" onclick="switchApp('music')">
                <span class="material-icons">library_music</span>
                <span class="label">Music</span>
            </button>
        </nav>
    </div>

    <script>
        let currentParty = [];

        function switchApp(app) {
            const buttons = document.querySelectorAll('.nav-btn');
            const frames = document.querySelectorAll('.app-frame');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            frames.forEach(frame => frame.classList.remove('active'));

            // This dynamically finds btnMusic and musicFrame
            const targetBtn = document.getElementById('btn' + app.charAt(0).toUpperCase() + app.slice(1));
            const targetFrame = document.getElementById(app + 'Frame');
            
            if (targetBtn) targetBtn.classList.add('active');
            if (targetFrame) targetFrame.classList.add('active');

            if (app === 'dice' && currentParty.length > 0) {
                targetFrame.contentWindow.postMessage({ type: 'SYNC_PARTY', party: currentParty }, '*');
            }
        }

        // Logic for message handling remains the same...
        window.addEventListener('message', function(event) {
            if (event.data.type === 'PARTY_CONFIRMED') {
                currentParty = event.data.party;
                const diceFrame = document.getElementById('diceFrame').contentWindow;
                diceFrame.postMessage({ type: 'SYNC_PARTY', party: currentParty }, '*');
            }
            if (event.data.type === 'REQUEST_SYNC') {
                if (currentParty.length > 0) {
                    event.source.postMessage({ type: 'SYNC_PARTY', party: currentParty }, '*');
                }
            }
            if (event.data.type === 'TAB_SHIFT') {
                const frames = document.querySelectorAll('.app-frame');
                frames.forEach(frame => {
                    if (frame.contentWindow !== event.source) {
                        frame.contentWindow.postMessage({ type: 'SET_ACTIVE_TAB', index: event.data.index }, '*');
                    }
                });
            }
        });
    </script>
</body>
</html>
