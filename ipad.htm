<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDMD: Tactical Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Caudex:ital,wght@0,400;0,700;1,400;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root { --accent: #ffcf67; --danger: #d32f2f; }
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('assets/bg.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #e0e0e0; font-family: 'Caudex', serif; margin: 0; padding: 0; 
            display: flex; height: 100vh; overflow: hidden;
        }

        .menu-logo { width: 100%; max-width: 280px; height: auto; align-self: center; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        #menuToggle {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(45, 77, 63, 0.9); border: 2px solid #8b7355;
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        #navDrawer {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 2000; display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .drawer-content {
            background: #1a1a1a; border: 3px solid #444; border-radius: 20px;
            width: 340px; padding: 25px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
		
		/* Version Label Styling */
		.version-container {
			position: fixed;
			bottom: 27px; /* Centered vertically with the 55px menu button */
			right: 85px;  /* 20px margin + 55px button width + 10px gap */
			display: flex;
			align-items: center;
			gap: 6px;
			background: rgba(0, 0, 0, 0.5);
			padding: 2px 10px;
			border-radius: 4px;
			border: 1px solid rgba(255, 207, 103, 0.2);
			z-index: 1000;
			pointer-events: none;
		}

		.version-logo-small {
			width: auto;
			height: 32px;
			filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
		}

		.version-number {
			font-family: 'MedievalSharp', serif;
			font-size: 0.75em;
			color: var(--accent);
			letter-spacing: 0.5px;
		}

		/* Red Menu Header */
		.setup-header-red {
			text-align: center; 
			font-size: 1.4em;
			color: #ff4444 !important; /* Overriding var(--accent) */
			text-shadow: 2px 2px 4px #000;
		}

        #mainContainer { display: none; padding: 15px; flex-grow: 1; flex-direction: column; gap: 10px; width: 100vw; box-sizing: border-box; }
        #mainContainer.active { display: flex; }

        .game-layout-top { display: flex; gap: 20px; flex: 1; min-height: 0; justify-content: center; }
        .game-grid { display: grid; grid-template-columns: auto auto; gap: 15px; }
        .sidebar-right { width: 230px; display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
        .column { display: flex; flex-direction: column; align-items: center; gap: 5px; }

        .label { font-family: 'MedievalSharp'; font-weight: bold; font-size: 0.9em; text-transform: uppercase; color: var(--accent); text-shadow: 0 2px 4px black; }

        .viewport { 
            position: relative; border: 3px solid #444; border-radius: 12px; background-color: #000; 
            background-repeat: no-repeat; background-position: center; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        .boss-card { width: 340px; height: 280px; background-size: 100% 400%; }
        .minion-card { width: 340px; height: 280px; background-size: 100% 100%; cursor: zoom-in; }
        .scenario-card { width: 460px; height: 280px; background-size: 100% 100%; cursor: zoom-in; }
        
        .mythos-card { width: 220px; height: 340px; cursor: zoom-in; z-index: 50; }
        .deck-layer {
            position: absolute; inset: 0; background: url('assets/mythoscardback.jpg') no-repeat center;
            background-size: cover; border: 3px solid #444; border-radius: 12px; transition: 0.3s;
        }
        .layer-2 { transform: translate(4px, 4px); z-index: 40; }
        .layer-3 { transform: translate(8px, 8px); z-index: 30; }

        .stage-nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%); width: 45px; height: 100px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,207,103,0.3);
            color: var(--accent); border-radius: 4px; display: none; 
            align-items: center; justify-content: center; z-index: 110;
            cursor: pointer; backdrop-filter: blur(1px);
        }
        .stage-nav-btn:active { background: var(--accent); color: black; }
        #stagePrev { left: 5px; }
        #stageNext { right: 5px; }

        .shuffle-active { animation: shuffle-spin 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) both; }
        .shuffle-layers { animation: layer-spin 0.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) both; }

        @keyframes shuffle-spin {
            0% { transform: scale(1) rotate(0deg); }
            30% { transform: scale(1.2) rotate(180deg); filter: brightness(1.5); }
            100% { transform: scale(1) rotate(360deg); filter: brightness(1); }
        }
        @keyframes layer-spin {
            0% { transform: translate(4px, 4px) rotate(0deg); }
            50% { transform: translate(-25px, 15px) rotate(-180deg); opacity: 0.6; }
            100% { transform: translate(4px, 4px) rotate(-360deg); opacity: 1; }
        }

        #mythosOverlaySymbol { position: absolute; inset: 0; background: url('assets/symbol.png') no-repeat center; background-size: 70%; opacity: 0; transition: 0.5s; pointer-events: none; z-index: 60; }
        #mythosOverlaySymbol.visible { opacity: 0.8; filter: drop-shadow(0 0 15px red); }
        
        .danger-glow { border-color: #ff0000 !important; box-shadow: 0 0 25px rgba(255, 0, 0, 0.8) !important; }
        
        #bossMessage {
            position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/symbol.png') no-repeat center;
            background-size: 60%; background-blend-mode: multiply; color: var(--accent);
            font-family: 'MedievalSharp'; font-size: 2.5em; text-align: center; padding: 20px; 
            pointer-events: none; z-index: 120; text-shadow: 3px 3px 6px #000, 0 0 15px #000; 
            filter: drop-shadow(0 0 15px rgba(0,0,0,1)); animation: fade-in 0.5s forwards;
        }

        .symbol-count-badge { 
            position: absolute; top: -10px; right: -10px; width: 80px; height: 80px; 
            background: rgba(0,0,0,.8) url('assets/symbol.png') no-repeat center; background-size: 100%;
            border-radius: 50%; border: 0px solid #000; display: none; align-items: center; justify-content: center; 
            color: #fff; font-family: 'MedievalSharp'; font-size: 52px; z-index: 80;
            text-shadow: 5px 5px 5px #000, 1px 1px 0 #000, 1px 1px 0 #000, 1px 1px 0 #000, 5px 5px 0 #000;
        }

        .history-bar { display: flex; gap: 12px; overflow-x: auto; padding: 10px; height: 140px; }
        .history-item { flex: 0 0 80px; height: 125px; border: 1px solid #444; border-radius: 6px; background-size: 400% 200%; cursor: pointer; transition: 0.2s; }
        
        #historyBar .history-item:first-child { border: 2px solid var(--accent); transform: scale(1.08); z-index: 2; opacity: 1; filter: brightness(1.1); }
        #historyBar .history-item:not(:first-child) { opacity: 0.7; }
        #historyBar .history-item:hover { opacity: 1; transform: scale(1.05); border-color: var(--accent); }

        #previewOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; justify-content: center; align-items: center; cursor: pointer; }
        #previewCard { border: 6px solid var(--accent); border-radius: 20px; background-color: #000; background-repeat: no-repeat; pointer-events: auto; }

        button { height: 55px; cursor: pointer; border-radius: 6px; font-family: 'MedievalSharp'; background: linear-gradient(#2d4d3f, #122b21); border: 2px solid #8b7355; color: white; display: flex; align-items: center; justify-content: center; }
        button:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .button-row { display: flex; gap: 8px; width: 100%; }
        .alt-btn { background: linear-gradient(#6d4c41, #3e2723); }
        .symbol-btn { background: linear-gradient(#642800, #3d1a00); }
        
        #countDisplay { color: #aaa; font-size: 0.8em; margin: 2px 0; }
		select {
			width: 100%;
			height: 45px;
			background-color: #333 !important;
			color: #fff !important; /* var(--accent) */
			border: 1px solid #444 !important;
			border-radius: 6px;
			padding: 0 40px 0 12px !important;
			font-family: 'Caudex', serif;
			font-size: 22px;
			cursor: pointer;

			/* 1. Remove ALL default browser styling */
			appearance: none !important;
			-webkit-appearance: none !important;
			-moz-appearance: none !important;

			/* 2. Layer the Arrow over the Background */
			background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffcf67'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e") !important;
			background-repeat: no-repeat !important;
			background-position: calc(100% - 12px) center !important;
			background-size: 18px !important;
		}

		/* 3. Fix for IE/Edge to hide default arrow */
		select::-ms-expand {
			display: none;
		}

		select:hover {
			border-color: #ffcf67 !important;
		}
   </style>
</head>
<body onload="initApp()">

    <div id="previewOverlay" onclick="this.style.display='none'">
        <div id="previewCard"></div>
    </div>
	
	<div class="version-container">
    <img src="assets/logo.png" class="version-logo-small" alt="icon">
    <span class="version-number">1.2.5</span>
	</div>

    <button id="menuToggle" onclick="toggleDrawer()"><span class="material-symbols-outlined">settings</span></button>

    <div id="navDrawer" onclick="closeDrawer(event)">
        <div class="drawer-content" onclick="event.stopPropagation()">
            <img src="assets/logo.png" alt="CDMD Logo" class="menu-logo">
            <div class="label" style="text-align: center; font-size: 1.4em; color:red;">Game Setup</div>
            <div id="setupButtons" style="display:flex; flex-direction:column; gap:10px;">
                <button id="connectBtn" onclick="initFolder()" style="font-size:22px;">LOAD GAME ASSETS</button>
                <button id="restoreBtn" class="alt-btn" style="display:none; font-size:22px;" onclick="restoreFolder()">RESTORE LAST SESSION</button>
            </div>
            <div id="drawerControls" style="display:none; flex-direction: column; gap:15px;">
                <div class="column">
                    <div class="label">Elder One</div>
                    <select id="bossSelect" onchange="loadBoss()"></select>
                </div>
                <div class="column">
                    <div class="label">Scenario</div>
                    <select id="scenarioSelect" onchange="loadScenario()"></select>
                </div>
                <button class="primary-btn" onclick="commitGameSettings()" style="background: #2e7d32; font-size: 1.2em; border-color: #4caf50; font-size:22px;">SAVE & PLAY</button>
            </div>
        </div>
    </div>

    <div id="mainContainer">
        <div class="game-layout-top">
            <div class="game-grid">
                <div class="column">
                    <div class="label">Elder One : <span id="bossNameTitle">...</span></div>
                    <div id="stageView" class="viewport boss-card">
                        <div id="bossMessage">"the boss lumbers forward..."</div>
                        <div id="stagePrev" class="stage-nav-btn" onclick="event.stopPropagation(); changeStage(-1)"><span class="material-symbols-outlined">navigate_before</span></div>
                        <div id="stageNext" class="stage-nav-btn" onclick="event.stopPropagation(); changeStage(1)"><span class="material-symbols-outlined">navigate_next</span></div>
                        <div style="position:absolute; inset:10px 60px; cursor: zoom-in; z-index: 105;" onclick="zoom(this.parentElement, 'boss')"></div>
                    </div>
                    <div class="label" style="margin:5px 0 0 0;"><span id="minionNameTitle">Elder One</span> : Minions</div>
                    <div id="minionView" class="viewport minion-card" onclick="zoom(this, 'fit')"></div>
                </div>
                <div class="column" >
                    <div class="label">Scenario : <span id="scenarioNameTitle">...</span></div>
                    <div id="scenarioView" class="viewport scenario-card" onclick="zoom(this, 'fit')"></div>
                    <div class="label" style="margin:5px 0 0 0;"><span id="monsterNameTitle">Scenario</span> : Monsters</div>
                    <div id="monsterView" class="viewport scenario-card" onclick="zoom(this, 'fit')"></div>
                </div>
            </div>

            <div class="sidebar-right">
                <div class="label">Mythos</div>
                <div id="deckContainer" style="position: relative; width: 220px; height: 340px;">
                    <div class="deck-layer layer-3"></div>
                    <div class="deck-layer layer-2"></div>
                    <div id="mythosView" class="viewport mythos-card" onclick="zoom(this, 'mythos_main')">
                        <div id="symbolBadge" class="symbol-count-badge">0</div>
                        <div id="mythosOverlaySymbol"></div>
                    </div>
                </div>
                <div id="countDisplay">Remaining: 0</div>
                <div class="button-row">
                    <button id="drawBtn" onclick="drawMythos()" style="flex:1"><span class="material-symbols-outlined">style</span></button>
                    <button class="alt-btn" onclick="initDeck()" style="flex:1"><span class="material-symbols-outlined">autorenew</span></button>
                    <button class="symbol-btn" onclick="cycleSymbolCount()" style="flex:1"><span class="material-symbols-outlined">add_circle</span></button>
                </div>
            </div>
        </div>
        <div id="historyBar" class="history-bar"></div>
    </div>

    <script>
        let folders = { bosses: {}, scenarios: {} };
        let currentBossMythosUrl = "", currentScenarioMythosUrl = "";
        let deck = [], drawnHistory = [], currentStageIdx = 0, symbolCounter = 0;

        function vibrate() { if (window.navigator.vibrate) window.navigator.vibrate(20); }
        function initApp() { toggleDrawer(); checkPersistence(); }

        async function openDB() { return new Promise((res) => { const req = indexedDB.open('CDMD_DB', 1); req.onupgradeneeded = () => req.result.createObjectStore('handles'); req.onsuccess = () => res(req.result); }); }
        async function saveHandle(handle) { const db = await openDB(); const tx = db.transaction('handles', 'readwrite'); tx.objectStore('handles').put(handle, 'rootFolder'); }
        async function getSavedHandle() { const db = await openDB(); return new Promise(res => { const req = db.transaction('handles').objectStore('handles').get('rootFolder'); req.onsuccess = () => res(req.result); }); }
        async function checkPersistence() { const handle = await getSavedHandle(); if (handle) { document.getElementById('connectBtn').style.display = 'none'; document.getElementById('restoreBtn').style.display = 'block'; } }
        async function restoreFolder() { const handle = await getSavedHandle(); if (await handle.queryPermission({mode: 'readwrite'}) !== 'granted') await handle.requestPermission({mode: 'readwrite'}); processFolder(handle); }
        async function initFolder() { try { const root = await window.showDirectoryPicker(); await saveHandle(root); processFolder(root); } catch (err) {} }

        function toggleDrawer() { const d = document.getElementById('navDrawer'); d.style.display = (d.style.display === 'flex') ? 'none' : 'flex'; }
        function closeDrawer(e) { if(e.target.id === 'navDrawer') toggleDrawer(); }

        async function processFolder(root) {
            const bSel = document.getElementById('bossSelect'); const sSel = document.getElementById('scenarioSelect');
            bSel.innerHTML = ''; sSel.innerHTML = '';
            for await (const entry of root.values()) {
                if (entry.name.toLowerCase() === 'bosses') {
                    for await (const b of entry.values()) { folders.bosses[b.name]=b; bSel.add(new Option(b.name,b.name)); }
                }
                if (entry.name.toLowerCase() === 'scenarios') {
                    for await (const s of entry.values()) { folders.scenarios[s.name]=s; sSel.add(new Option(s.name,s.name)); }
                }
            }
            document.getElementById('drawerControls').style.display = 'flex';
            document.getElementById('setupButtons').style.display = 'none';
            if (bSel.options.length > 0) loadBoss();
        }

        async function loadBoss() {
            const bossName = document.getElementById('bossSelect').value;
            document.getElementById('bossNameTitle').innerText = bossName;
            document.getElementById('minionNameTitle').innerText = bossName;
            const folder = folders.bosses[bossName];
            for await (const entry of folder.values()) {
                const file = await entry.getFile(); const url = URL.createObjectURL(file);
                if (entry.name.toLowerCase().includes('mythos')) currentBossMythosUrl = url;
                if (entry.name.toLowerCase().includes('stage')) document.getElementById('stageView').dataset.url = url;
                if (entry.name.toLowerCase().includes('minion')) document.getElementById('minionView').dataset.url = url;
            }
            if (Object.keys(folders.scenarios).length > 0) loadScenario();
        }

        async function loadScenario() {
            const scenarioName = document.getElementById('scenarioSelect').value;
            document.getElementById('scenarioNameTitle').innerText = scenarioName;
            document.getElementById('monsterNameTitle').innerText = scenarioName;
            const folder = folders.scenarios[scenarioName];
            for await (const entry of folder.values()) {
                const file = await entry.getFile(); const url = URL.createObjectURL(file);
                if (entry.name.toLowerCase().includes('monster')) document.getElementById('monsterView').dataset.url = url;
                else if (entry.name.toLowerCase().includes('scenario')) document.getElementById('scenarioView').dataset.url = url;
                else if (entry.name.toLowerCase().includes('mythos')) currentScenarioMythosUrl = url;
            }
        }

        function commitGameSettings() {
            vibrate();
            document.getElementById('mainContainer').classList.add('active');
            ['stageView', 'minionView', 'monsterView', 'scenarioView'].forEach(id => {
                const el = document.getElementById(id); if(el.dataset.url) el.style.backgroundImage = `url('${el.dataset.url}')`;
            });
            initDeck(); setStage(0); toggleDrawer();
        }

        async function initDeck() {
            vibrate();
            const historyBar = document.getElementById('historyBar');
            const mythosView = document.getElementById('mythosView');
            const items = Array.from(historyBar.children);

            if (items.length > 0) {
                new Audio('assets/flip.mp3').play().catch(() => {});
                items.forEach((item, index) => {
                    setTimeout(() => {
                        item.style.opacity = '0';
                        const rect = item.getBoundingClientRect();
                        const deckRect = mythosView.getBoundingClientRect();
                        const scaleTarget = deckRect.width / rect.width;
                        const flyer = document.createElement('div');
                        flyer.className = 'history-item';
                        flyer.style.cssText = `position:fixed; top:${rect.top}px; left:${rect.left}px; width:${rect.width}px; height:${rect.height}px; z-index:1; background-image:url('assets/mythoscardback.jpg'); background-size:cover; pointer-events:none; opacity:1; transition: top 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), left 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.1s linear 0.5s;`;
                        document.body.appendChild(flyer);
                        requestAnimationFrame(() => {
                            flyer.style.top = (deckRect.top + 120) + 'px';
                            flyer.style.left = deckRect.left + 'px';
                            flyer.style.opacity = '0';
                            flyer.style.transform = `scale(${scaleTarget}) rotate(360deg)`;
                        });
                        setTimeout(() => flyer.remove(), 700);
                    }, index * 60);
                });
            }

            const waitTime = items.length > 0 ? (items.length * 60) + 50 : 0;
            setTimeout(() => {
                new Audio('assets/shuffling-cards-6.mp3').play().catch(() => {});
                const layers = document.querySelectorAll('.deck-layer');
                mythosView.classList.remove('shuffle-active'); 
                layers.forEach(l => l.classList.remove('shuffle-layers'));
                void mythosView.offsetWidth;
                mythosView.classList.add('shuffle-active'); 
                layers.forEach(l => l.classList.add('shuffle-layers'));

                const grid = [{x:0,y:0},{x:33.33,y:0},{x:66.66,y:0},{x:100,y:0},{x:0,y:100},{x:33.33,y:100},{x:66.66,y:100},{x:100,y:100}];
                deck = [...grid.map(p=>({...p, type:'boss'})), ...grid.map(p=>({...p, type:'scenario'}))].sort(() => Math.random() - 0.5);
                drawnHistory = []; symbolCounter = 0;
                historyBar.innerHTML = '';
                document.getElementById('symbolBadge').style.display = 'none';
                document.getElementById('mythosOverlaySymbol').classList.remove('visible');
                mythosView.classList.remove('danger-glow');
                document.getElementById('stageView').classList.remove('danger-glow');
                document.getElementById('bossMessage').style.display = 'none';
                document.getElementById('drawBtn').disabled = false;
                mythosView.style.backgroundImage = "url('assets/mythoscardback.jpg')";
                mythosView.style.backgroundSize = "cover";
                document.getElementById('countDisplay').innerText = `Remaining: ${deck.length}`;
                updateStageNav();
            }, waitTime);
        }

        function drawMythos() {
            if (deck.length === 0 || symbolCounter === 3) return;
            vibrate();
            const c = deck.pop(); drawnHistory.push(c);
            const currentIdx = drawnHistory.length - 1;
            if (deck.length === 0) {
                new Audio('assets/enddraw.mp3').play().catch(() => {});
                document.getElementById('drawBtn').disabled = true;
            } else { new Audio('assets/card.mp3').play().catch(() => {}); }

            const mythosView = document.getElementById('mythosView');
            applyStyle(mythosView, c);
            const item = document.createElement('div');
            item.className = 'history-item'; applyStyle(item, c);
            item.onclick = (e) => { e.stopPropagation(); showHistoryZoom(currentIdx); };
            document.getElementById('historyBar').prepend(item);
            document.getElementById('countDisplay').innerText = `Remaining: ${deck.length}`;
        }

        function applyStyle(el, card) {
            const url = card.type === 'boss' ? currentBossMythosUrl : currentScenarioMythosUrl;
            el.style.backgroundImage = `url('${url}')`;
            el.style.backgroundSize = "410% 210%"; el.style.backgroundPosition = `${card.x}% ${card.y}%`;
        }

        function zoom(el, type) {
            if (el.style.backgroundImage.includes('mythoscardback.jpg')) return;
            vibrate();
            const p = document.getElementById('previewOverlay'); const card = document.getElementById('previewCard');
            const bgUrl = el.style.backgroundImage.slice(5, -2);
            card.style.backgroundImage = `url('${bgUrl}')`;
            card.style.backgroundPosition = el.style.backgroundPosition;
            if (type === 'boss') { card.style.width = "100vh"; card.style.height = "85vh"; card.style.backgroundSize = "100% 400%"; } 
            else if (type === 'fit') { card.style.width = "90vw"; card.style.height = "60vw"; card.style.backgroundSize = "100% 100%"; } 
            else { card.style.height = "85vh"; card.style.width = "58vh"; card.style.backgroundSize = "410% 210%"; }
            p.style.display = 'flex';
        }

        function showHistoryZoom(idx) {
            const c = drawnHistory[idx]; vibrate();
            const p = document.getElementById('previewOverlay'); const card = document.getElementById('previewCard');
            const url = c.type === 'boss' ? currentBossMythosUrl : currentScenarioMythosUrl;
            card.style.backgroundImage = `url('${url}')`;
            card.style.backgroundPosition = `${c.x}% ${c.y}%`;
            card.style.backgroundSize = "410% 210%"; card.style.height = "85vh"; card.style.width = "58vh";
            p.style.display = 'flex';
        }

        function cycleSymbolCount() {
            vibrate(); new Audio('assets/symbol.mp3').play().catch(() => {});
            if (symbolCounter >= 3) { initDeck(); return; }
            symbolCounter++;
            const badge = document.getElementById('symbolBadge');
            badge.innerText = symbolCounter; badge.style.display = 'flex';
            if (symbolCounter === 3) {
                new Audio('assets/appear.mp3').play().catch(() => {});
                document.getElementById('mythosOverlaySymbol').classList.add('visible');
                const selectedBoss = document.getElementById('bossSelect').value;
                document.getElementById('bossMessage').innerText = `"${selectedBoss} lumbers forward..."`;
                document.getElementById('mythosView').classList.add('danger-glow');
                document.getElementById('stageView').classList.add('danger-glow');
                document.getElementById('bossMessage').style.display = 'flex';
                document.getElementById('drawBtn').disabled = true;
            }
            updateStageNav();
        }

        function updateStageNav() {
            const prev = document.getElementById('stagePrev');
            const next = document.getElementById('stageNext');
            if (symbolCounter === 3) { prev.style.display = 'none'; next.style.display = 'none'; return; }
            prev.style.display = (currentStageIdx === 0) ? 'none' : 'flex';
            next.style.display = (currentStageIdx === 3) ? 'none' : 'flex';
        }

        function setStage(idx) { 
            vibrate(); 
            currentStageIdx = idx; 
            document.getElementById('stageView').style.backgroundPosition = `0% ${[100, 66.66, 33.33, 0][idx]}%`; 
            updateStageNav();
        }
        function changeStage(dir) { let n = currentStageIdx + dir; if (n >= 0 && n < 4) setStage(n); }
    </script>
</body>
</html>
