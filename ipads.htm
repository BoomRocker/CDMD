<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CDMD: Tactical Grid</title>
    
    <link rel="icon" type="image/png" href="assets/symbol.png">
    <link rel="apple-touch-icon" href="assets/symbol.png">
    <link href="https://fonts.googleapis.com/css2?family=Caudex:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root { --accent: #ffcf67; }
        
        body { 
            background: #000 url('assets/bg.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e0e0e0; font-family: 'Caudex', serif; 
            margin: 0; padding: 0;
            display: flex; 
            height: 100vh; height: 100dvh; 
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        /* Version Label Styling */
        #versionTag {
            position: fixed; bottom: 38px; right: 85px; 
            font-family: 'MedievalSharp'; font-size: 14px; color: var(--accent);
            text-shadow: 2px 2px 4px black; opacity: 0.8; pointer-events: none;
        }

        #menuToggle {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(45, 77, 63, 0.9); border: 2px solid #8b7355;
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            touch-action: manipulation;
        }

        #navDrawer {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .drawer-content {
            background: #1a1a1a; border: 3px solid #444; border-radius: 20px;
            width: 340px; padding: 25px; display: flex; flex-direction: column; gap: 15px;
        }

        #mainContainer { 
            display: none; padding: 10px; width: 100%; height: 100%;
            flex-direction: column; gap: 10px;
        }
        #mainContainer.active { display: flex; }

        .game-layout-top { display: flex; gap: 15px; flex: 1; min-height: 0; justify-content: center; align-items: center; }
        .game-grid { display: grid; grid-template-columns: auto auto; gap: 10px; }
        .sidebar-right { width: 220px; display: flex; flex-direction: column; align-items: center; gap: 5px; }

        .viewport { 
            position: relative; border: 2px solid #444; border-radius: 10px; background-color: #000; 
            background-repeat: no-repeat; background-position: center;
        }
        .boss-card { width: 320px; height: 260px; background-size: 100% 400%; }
        .minion-card { width: 320px; height: 260px; background-size: 100% 100%; }
        .scenario-card { width: 440px; height: 260px; background-size: 100% 100%; }
        .mythos-card { width: 200px; height: 300px; z-index: 50; }

        .label { font-family: 'MedievalSharp'; font-size: 0.85em; color: var(--accent); text-align: center; }

        .stage-nav-btn {
            position: absolute; top: 0; bottom: 0; width: 40px;
            background: rgba(0,0,0,0.1); color: var(--accent);
            display: none; align-items: center; justify-content: center; z-index: 110;
        }
        #stagePrev { left: 0; } #stageNext { right: 0; }

        .history-bar { display: flex; gap: 10px; overflow-x: auto; padding: 5px; height: 120px; width: 100%; }
        .history-item { flex: 0 0 70px; height: 100px; border: 1px solid #444; border-radius: 5px; background-size: 400% 200%; }

        #previewOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; justify-content: center; align-items: center; }
        #previewCard { border: 4px solid var(--accent); border-radius: 15px; background-color: #000; background-repeat: no-repeat; }

        button { height: 50px; font-family: 'MedievalSharp'; background: #2d4d3f; border: 2px solid #8b7355; color: white; touch-action: manipulation; }
        button:active { background: #456d5b; }
        
        select { width: 100%; height: 40px; background: #000; color: var(--accent); border: 1px solid #444; border-radius: 5px; }
        
        #bossMessage {
            position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6) url('assets/symbol.png') no-repeat center; background-size: 50%;
            color: var(--accent); font-family: 'MedievalSharp'; font-size: 1.5em; text-align: center;
        }

        .symbol-count-badge { 
            position: absolute; top: -5px; right: -5px; width: 60px; height: 60px; 
            background: rgba(0,0,0,.8) url('assets/symbol.png') no-repeat center; background-size: cover;
            border-radius: 50%; display: none; align-items: center; justify-content: center; 
            color: #fff; font-family: 'MedievalSharp'; font-size: 40px; z-index: 80;
        }
    </style>
</head>
<body onload="initGitHub()">

    <div id="previewOverlay" onclick="this.style.display='none'">
        <div id="previewCard"></div>
    </div>

    <div id="versionTag">v1.2</div>
    <button id="menuToggle" onclick="toggleDrawer()"><span class="material-symbols-outlined">settings</span></button>

    <div id="navDrawer" onclick="closeDrawer(event)">
        <div class="drawer-content" onclick="event.stopPropagation()">
            <div id="loader" style="text-align: center; font-family: 'MedievalSharp'; color: var(--accent);">CONNECTING TO GITHUB...</div>
            <div id="drawerControls" style="display:none; flex-direction: column; gap:10px;">
                <div class="label">Setup Game</div>
                <select id="bossSelect" onchange="loadBoss()"></select>
                <select id="scenarioSelect" onchange="loadScenario()"></select>
                <button onclick="commitGameSettings()" style="background: #2e7d32; margin-top: 10px;">START GAME</button>
            </div>
        </div>
    </div>

    <div id="mainContainer">
        <div class="game-layout-top">
            <div class="game-grid">
                <div class="column">
                    <div class="label"><span id="bossNameTitle">Elder One</span></div>
                    <div id="stageView" class="viewport boss-card">
                        <div id="bossMessage">"LUMBERING FORWARD..."</div>
                        <div id="stagePrev" class="stage-nav-btn" onclick="event.stopPropagation(); changeStage(-1)">◀</div>
                        <div id="stageNext" class="stage-nav-btn" onclick="event.stopPropagation(); changeStage(1)">▶</div>
                        <div style="position:absolute; inset:0; z-index:100;" onclick="zoom(this.parentElement, 'boss')"></div>
                    </div>
                    <div class="label" style="margin-top:5px;"><span id="minionNameTitle">Minion</span>: Minion</div>
                    <div id="minionView" class="viewport minion-card" onclick="zoom(this, 'fit')"></div>
                </div>
                <div class="column">
                    <div class="label"><span id="scenarioNameTitle">Scenario</span></div>
                    <div id="scenarioView" class="viewport scenario-card" onclick="zoom(this, 'fit')"></div>
                    <div class="label" style="margin-top:5px;"><span id="monsterNameTitle">Scenario</span>: Monsters</div>
                    <div id="monsterView" class="viewport scenario-card" onclick="zoom(this, 'fit')"></div>
                </div>
            </div>

            <div class="sidebar-right">
                <div class="label">Mythos</div>
                <div id="mythosView" class="viewport mythos-card" onclick="zoom(this, 'mythos')">
                    <div id="symbolBadge" class="symbol-count-badge">0</div>
                </div>
                <div id="countDisplay" style="font-size: 0.7em;">Rem: 0</div>
                <div style="display:flex; gap:5px; width:100%;">
                    <button id="drawBtn" onclick="drawMythos()" style="flex:1">DRAW</button>
                    <button onclick="initDeck()" style="width:50px">↺</button>
                    <button onclick="cycleSymbolCount()" style="width:50px">★</button>
                </div>
            </div>
        </div>
        <div id="historyBar" class="history-bar"></div>
    </div>

    <script>
        const GH_CONFIG = { user: "boomrocker", repo: "CDMD" };
        const API_URL = `https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents`;
        let bossMythos = "", scenMythos = "", deck = [], drawn = [], stageIdx = 0, symbols = 0;

        function toggleDrawer() { const d = document.getElementById('navDrawer'); d.style.display = (d.style.display === 'flex') ? 'none' : 'flex'; }
        function closeDrawer(e) { if(e.target.id === 'navDrawer') toggleDrawer(); }

        async function initGitHub() {
            try {
                const [bResp, sResp] = await Promise.all([fetch(`${API_URL}/Bosses`), fetch(`${API_URL}/scenarios`)]);
                const [bDirs, sDirs] = await Promise.all([bResp.json(), sResp.json()]);
                
                const bSel = document.getElementById('bossSelect');
                const sSel = document.getElementById('scenarioSelect');
                bDirs.forEach(d => { if(d.type === 'dir') bSel.add(new Option(d.name, d.name)); });
                sDirs.forEach(d => { if(d.type === 'dir') sSel.add(new Option(d.name, d.name)); });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('drawerControls').style.display = 'flex';
                loadBoss();
            } catch (e) { document.getElementById('loader').innerText = "GITHUB ERROR"; }
        }

        async function loadBoss() {
            const name = document.getElementById('bossSelect').value;
            document.getElementById('bossNameTitle').innerText = name;
            document.getElementById('minionNameTitle').innerText = name;
            const res = await fetch(`${API_URL}/Bosses/${name}`);
            const files = await res.json();
            files.forEach(f => {
                if (f.name.toLowerCase().includes('mythos')) bossMythos = f.download_url;
                if (f.name.toLowerCase().includes('stage')) document.getElementById('stageView').style.backgroundImage = `url('${f.download_url}')`;
                if (f.name.toLowerCase().includes('minion')) document.getElementById('minionView').style.backgroundImage = `url('${f.download_url}')`;
            });
            if (document.getElementById('scenarioSelect').options.length > 0) loadScenario();
        }

        async function loadScenario() {
            const name = document.getElementById('scenarioSelect').value;
            document.getElementById('scenarioNameTitle').innerText = name;
            document.getElementById('monsterNameTitle').innerText = name;
            const res = await fetch(`${API_URL}/scenarios/${name}`);
            const files = await res.json();
            files.forEach(f => {
                if (f.name.toLowerCase().includes('monster')) document.getElementById('monsterView').style.backgroundImage = `url('${f.download_url}')`;
                if (f.name.toLowerCase().includes('scenario')) document.getElementById('scenarioView').style.backgroundImage = `url('${f.download_url}')`;
                if (f.name.toLowerCase().includes('mythos')) scenMythos = f.download_url;
            });
        }

        function commitGameSettings() {
            document.getElementById('mainContainer').classList.add('active');
            initDeck(); setStage(0); toggleDrawer();
        }

        function initDeck() {
            const grid = [{x:0,y:0},{x:33.3,y:0},{x:66.6,y:0},{x:100,y:0},{x:0,y:100},{x:33.3,y:100},{x:66.6,y:100},{x:100,y:100}];
            deck = [...grid.map(p=>({...p,t:'b'})), ...grid.map(p=>({...p,t:'s'}))].sort(()=>Math.random()-0.5);
            drawn = []; symbols = 0;
            document.getElementById('historyBar').innerHTML = '';
            document.getElementById('symbolBadge').style.display = 'none';
            document.getElementById('mythosView').style.backgroundImage = "url('assets/mythoscardback.jpg')";
            document.getElementById('mythosView').style.backgroundSize = "cover";
            document.getElementById('countDisplay').innerText = `Rem: ${deck.length}`;
            document.getElementById('bossMessage').style.display = 'none';
            updateStageNav();
        }

        function drawMythos() {
            if (!deck.length || symbols >= 3) return;
            const c = deck.pop(); drawn.push(c);
            const mv = document.getElementById('mythosView');
            mv.style.backgroundImage = `url('${c.t === 'b' ? bossMythos : scenMythos}')`;
            mv.style.backgroundSize = "410% 210%";
            mv.style.backgroundPosition = `${c.x}% ${c.y}%`;
            
            const item = document.createElement('div');
            item.className = 'history-item';
            item.style.backgroundImage = mv.style.backgroundImage;
            item.style.backgroundSize = "410% 210%";
            item.style.backgroundPosition = mv.style.backgroundPosition;
            item.onclick = () => {
                const pc = document.getElementById('previewCard');
                pc.style.backgroundImage = item.style.backgroundImage;
                pc.style.backgroundPosition = item.style.backgroundPosition;
                pc.style.backgroundSize = "410% 210%"; pc.style.width="80vw"; pc.style.height="80vh";
                document.getElementById('previewOverlay').style.display = 'flex';
            };
            document.getElementById('historyBar').prepend(item);
            document.getElementById('countDisplay').innerText = `Rem: ${deck.length}`;
        }

        function cycleSymbolCount() {
            if (symbols >= 3) { initDeck(); return; }
            symbols++;
            const b = document.getElementById('symbolBadge');
            b.innerText = symbols; b.style.display = 'flex';
            if (symbols === 3) {
                document.getElementById('bossMessage').style.display = 'flex';
            }
            updateStageNav();
        }

        function updateStageNav() {
            const p = document.getElementById('stagePrev'), n = document.getElementById('stageNext');
            p.style.display = (symbols < 3 && stageIdx > 0) ? 'flex' : 'none';
            n.style.display = (symbols < 3 && stageIdx < 3) ? 'flex' : 'none';
        }

        function setStage(i) { stageIdx = i; document.getElementById('stageView').style.backgroundPosition = `0 ${[100, 66.6, 33.3, 0][i]}%`; updateStageNav(); }
        function changeStage(d) { setStage(stageIdx + d); }

        function zoom(el, type) {
            const pc = document.getElementById('previewCard');
            pc.style.backgroundImage = el.style.backgroundImage;
            pc.style.backgroundPosition = el.style.backgroundPosition;
            if (type === 'boss') { pc.style.width="90vw"; pc.style.height="75vh"; pc.style.backgroundSize="100% 400%"; }
            else if (type === 'fit') { pc.style.width="95vw"; pc.style.height="60vh"; pc.style.backgroundSize="100% 100%"; }
            else { pc.style.width="80vw"; pc.style.height="80vh"; pc.style.backgroundSize="410% 210%"; }
            document.getElementById('previewOverlay').style.display = 'flex';
        }
    </script>
</body>
</html>
