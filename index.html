<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CDMD: Tactical Grid</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Caudex:ital,wght@0,400;0,700;1,400;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root { --accent: #ffcf67; --danger: #8b0000; }
        body { 
            background: #1a1a1a; color: #e0e0e0; font-family: 'Caudex', serif; margin: 0; padding: 0; 
            display: flex; height: 100vh; overflow: hidden; position: fixed; width: 100%;
        }
        #footerControls { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; align-items: center; gap: 12px; }
        #menuToggle { width: 55px; height: 55px; border-radius: 50%; background: rgba(45, 77, 63, 0.9); border: 2px solid #8b7355; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #navDrawer { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .drawer-content { background: #222; border: 3px solid #444; border-radius: 20px; width: 340px; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        #mainContainer { display: none; padding: 15px; flex-grow: 1; flex-direction: column; gap: 10px; width: 100vw; box-sizing: border-box; }
        #mainContainer.active { display: flex; }
        .game-layout-top { display: flex; gap: 20px; flex: 1; min-height: 0; justify-content: center; }
        .game-grid { display: grid; grid-template-columns: auto auto; gap: 15px; }
        .viewport { position: relative; border: 3px solid #444; border-radius: 12px; background-color: rgba(0,0,0,0.6); background-repeat: no-repeat; background-position: center; }
        .boss-card { width: 340px; height: 280px; background-size: 100% 400%; }
        .minion-card { width: 340px; height: 280px; background-size: 100% 100%; }
        .scenario-card { width: 460px; height: 280px; background-size: 100% 100%; }
        .mythos-card { width: 220px; height: 340px; z-index: 50; background-size: cover; border: 2px solid #444; border-radius: 10px; }
        .label { font-family: 'MedievalSharp'; font-weight: bold; font-size: 0.9em; text-transform: uppercase; color: var(--accent); }
        button { height: 50px; cursor: pointer; border-radius: 8px; font-family: 'MedievalSharp'; background: #2d4d3f; border: 1px solid #8b7355; color: white; }
        select { width: 100%; height: 50px; background: #000; color: var(--accent); border: 1px solid #8b7355; padding: 0 10px; }
        .history-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px; height: 130px; }
        .history-item { flex: 0 0 80px; height: 110px; border: 1px solid #444; background-size: 410% 210%; }
        #previewOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; justify-content: center; align-items: center; }
    </style>
</head>
<body onload="toggleDrawer()">

    <div id="previewOverlay" onclick="this.style.display='none'">
        <div id="previewCard" style="background-repeat: no-repeat; border: 4px solid var(--accent);"></div>
    </div>

    <div id="footerControls">
        <button id="menuToggle" onclick="toggleDrawer()"><span class="material-symbols-outlined">settings</span></button>
    </div>

    <div id="navDrawer">
        <div class="drawer-content">
            <div class="label" style="text-align: center; font-size: 1.2em;">GitHub Sync</div>
            <button id="connectBtn" onclick="loadFromGitHub()">SYNC REPOSITORY</button>
            <div id="drawerControls" style="display:none; flex-direction: column; gap:15px;">
                <div>
                    <div class="label">Elder One</div>
                    <select id="bossSelect" onchange="loadBoss()"></select>
                </div>
                <div>
                    <div class="label">Scenario</div>
                    <select id="scenarioSelect" onchange="loadScenario()"></select>
                </div>
                <button onclick="commitGameSettings()">START GAME</button>
            </div>
        </div>
    </div>

    <div id="mainContainer">
        <div class="game-layout-top">
            <div class="game-grid">
                <div class="column">
                    <div class="label">Elder One: <span id="bossNameTitle">...</span></div>
                    <div id="stageView" class="viewport boss-card" onclick="zoom(this, 'boss')"></div>
                    <div class="label">Minions</div>
                    <div id="minionView" class="viewport minion-card" onclick="zoom(this, 'fit')"></div>
                </div>
                <div class="column">
                    <div class="label">Scenario: <span id="scenarioNameTitle">...</span></div>
                    <div id="scenarioView" class="viewport scenario-card" onclick="zoom(this, 'fit')"></div>
                    <div class="label">Monsters</div>
                    <div id="monsterView" class="viewport scenario-card" onclick="zoom(this, 'fit')"></div>
                </div>
            </div>
            <div class="sidebar" style="width: 220px; display:flex; flex-direction:column; gap:10px;">
                <div class="label">Mythos</div>
                <div id="mythosView" class="viewport mythos-card" onclick="zoom(this, 'mythos')"></div>
                <button onclick="drawMythos()">DRAW CARD</button>
                <button onclick="initDeck()" style="background:#444;">SHUFFLE</button>
            </div>
        </div>
        <div id="historyBar" class="history-bar"></div>
    </div>

    <script>
        const GH_USER = "boomrocker";
        const GH_REPO = "CDMD";
        const API_BASE = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents`;
        const RAW_BASE = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main`;

        let assetMap = { bosses: {}, scenarios: {} };
        let deck = [], history = [];
        let bossMythos = "", scenarioMythos = "";

        function toggleDrawer() { 
            const d = document.getElementById('navDrawer');
            d.style.display = (d.style.display === 'flex') ? 'none' : 'flex';
        }

        async function loadFromGitHub() {
            const btn = document.getElementById('connectBtn');
            btn.innerText = "SEARCHING...";
            try {
                const root = await fetch(API_BASE).then(r => r.json());
                const bossDir = root.find(f => f.name.toLowerCase() === 'bosses');
                const scenDir = root.find(f => f.name.toLowerCase() === 'scenarios');

                if (bossDir) {
                    const bList = await fetch(bossDir.url).then(r => r.json());
                    const bSel = document.getElementById('bossSelect');
                    bSel.innerHTML = "";
                    bList.filter(f => f.type === 'dir').forEach(f => {
                        assetMap.bosses[f.name] = f.path;
                        bSel.add(new Option(f.name, f.name));
                    });
                }

                if (scenDir) {
                    const sList = await fetch(scenDir.url).then(r => r.json());
                    const sSel = document.getElementById('scenarioSelect');
                    sSel.innerHTML = "";
                    sList.filter(f => f.type === 'dir').forEach(f => {
                        assetMap.scenarios[f.name] = f.path;
                        sSel.add(new Option(f.name, f.name));
                    });
                }

                document.getElementById('drawerControls').style.display = 'flex';
                btn.innerText = "CONNECTED";
                btn.disabled = true;
                loadBoss();
            } catch (e) {
                console.error(e);
                btn.innerText = "SYNC FAILED";
            }
        }

        async function loadBoss() {
            const name = document.getElementById('bossSelect').value;
            const files = await fetch(`${API_BASE}/${assetMap.bosses[name]}`).then(r => r.json());
            files.forEach(f => {
                const url = `${RAW_BASE}/${f.path}`;
                if (f.name.toLowerCase().includes('stage')) document.getElementById('stageView').dataset.url = url;
                if (f.name.toLowerCase().includes('minion')) document.getElementById('minionView').dataset.url = url;
                if (f.name.toLowerCase().includes('mythos')) bossMythos = url;
            });
            document.getElementById('bossNameTitle').innerText = name;
            loadScenario();
        }

        async function loadScenario() {
            const name = document.getElementById('scenarioSelect').value;
            const files = await fetch(`${API_BASE}/${assetMap.scenarios[name]}`).then(r => r.json());
            files.forEach(f => {
                const url = `${RAW_BASE}/${f.path}`;
                if (f.name.toLowerCase().includes('monster')) document.getElementById('monsterView').dataset.url = url;
                if (f.name.toLowerCase().includes('scenario')) document.getElementById('scenarioView').dataset.url = url;
                if (f.name.toLowerCase().includes('mythos')) scenarioMythos = url;
            });
            document.getElementById('scenarioNameTitle').innerText = name;
        }

        function commitGameSettings() {
            ['stageView', 'minionView', 'monsterView', 'scenarioView'].forEach(id => {
                const el = document.getElementById(id);
                if (el.dataset.url) el.style.backgroundImage = `url('${el.dataset.url}')`;
            });
            document.getElementById('mainContainer').classList.add('active');
            initDeck();
            toggleDrawer();
        }

        function initDeck() {
            const grid = [{x:0,y:0},{x:33,y:0},{x:66,y:0},{x:100,y:0},{x:0,y:100},{x:33,y:100},{x:66,y:100},{x:100,y:100}];
            deck = [
                ...grid.map(p => ({...p, type:'boss'})),
                ...grid.map(p => ({...p, type:'scen'}))
            ].sort(() => Math.random() - 0.5);
            history = [];
            document.getElementById('historyBar').innerHTML = '';
            document.getElementById('mythosView').style.backgroundImage = "none";
        }

        function drawMythos() {
            if (!deck.length) return;
            const c = deck.pop();
            history.push(c);
            const view = document.getElementById('mythosView');
            const url = c.type === 'boss' ? bossMythos : scenarioMythos;
            view.style.backgroundImage = `url('${url}')`;
            view.style.backgroundPosition = `${c.x}% ${c.y}%`;
            view.style.backgroundSize = "410% 210%";

            const item = document.createElement('div');
            item.className = 'history-item';
            item.style.backgroundImage = `url('${url}')`;
            item.style.backgroundPosition = `${c.x}% ${c.y}%`;
            document.getElementById('historyBar').prepend(item);
        }

        function zoom(el, type) {
            const p = document.getElementById('previewOverlay');
            const card = document.getElementById('previewCard');
            card.style.backgroundImage = el.style.backgroundImage;
            card.style.backgroundPosition = el.style.backgroundPosition;
            card.style.backgroundSize = el.style.backgroundSize;
            
            if (type === 'boss') { card.style.width = "80vw"; card.style.height = "60vh"; }
            else if (type === 'fit') { card.style.width = "90vw"; card.style.height = "40vh"; }
            else { card.style.width = "300px"; card.style.height = "450px"; }
            
            p.style.display = 'flex';
        }
    </script>
</body>
</html>
