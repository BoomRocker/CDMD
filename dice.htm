<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CDMD: Dice</title>
    
    <link rel="icon" type="image/png" href="assets/dice/icon-green-dice.png">
    <link rel="apple-touch-icon" href="assets/dice/icon-green-dice.png">
    <link href="https://fonts.googleapis.com/css2?family=Caudex:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ffcf67; 
            --bright-green: #2ecc71; 
            --succ-color: #ffcf67; 
            --tent-color: #e74c3c; 
            --elde-color: #27ae60; 
            --border-gold: #8b7355;
        }
        
        body {
            background-color: #000;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('assets/bg.jpg');
            background-size: cover;
            color: #e0e0e0;
            font-family: 'Caudex', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 20px 120px 20px;
            box-sizing: border-box;
        }

        /* INVESTIGATOR BAR STYLES */
        .investigator-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            width: 100%;
            max-width: 500px;
            padding: 0 0 15px 0;
            scrollbar-width: none;
        }
        .investigator-bar::-webkit-scrollbar { display: none; }

        .char-tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            border-radius: 4px;
            color: #888;
            font-family: 'MedievalSharp';
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .char-tab.active {
            background: #1a3c2a;
            border-color: var(--bright-green);
            color: white;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
        }

        .add-char {
            background: none;
            border: 1px dashed #555;
            color: #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'MedievalSharp';
        }

        .controls {
            display: flex; gap: 30px; margin-bottom: 25px;
			background: rgba(69, 90, 100, 0.25) !important;
			padding: 12px 25px;
            border-radius: 60px; border: 1px solid #333; backdrop-filter: blur(8px);
        }

        .die-counter { display: flex; align-items: center; gap: 12px; font-weight: bold; }
        .type-icon { width: 32px; height: 32px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .die-counter span[id*="Count"] { font-size: 1.4em; min-width: 25px; text-align: center; }
        
        .btn-circle-black, .btn-circle-green { 
            width: 44px; height: 44px; border-radius: 50%; 
            border: 2px solid #333; background: rgba(0,0,0,0.3); 
            cursor: pointer; font-size: 1.5em; display: flex; align-items: center; justify-content: center;
        }
        .btn-circle-black { color: gray; }
        .btn-circle-green { color: green; }
        #greenCount { color: green; }
        #blackCount { color: gray; }
        
        .dice-tray {
            width: 100%; max-width: 500px;
            background-image: linear-gradient(rgba(13, 26, 20, 0.4), rgba(8, 17, 13, 0.4)), url('assets/dice/wood.jpg'); 
            background-size: cover; background-position: center;
            border: 10px solid #2a1a10; border-radius: 24px;
            box-shadow: inset 0 0 1px 1px #8b7355, inset 5px 15px 40px rgba(0,0,0,0.9), 0 15px 35px rgba(0,0,0,0.7); 
            padding: 35px; min-height: 220px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-bottom: 25px; box-sizing: border-box;
        }

        .die-scene { width: 82px; height: 82px; perspective: 600px; cursor: pointer; position: relative; transition: transform 0.2s; }
        .die-scene::after { content: ''; position: absolute; bottom: -8px; left: 10%; width: 80%; height: 15px; background: rgba(0,0,0,0.6); filter: blur(8px); border-radius: 50%; z-index: -1; }
        .die-scene.held { transform: scale(1.08); }
        .die-scene.held .cube-face { border: 2px solid #fff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), inset 0 0 15px rgba(255, 207, 103, 0.6); filter: brightness(1.2); }

        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .cube-face { position: absolute; width: 82px; height: 82px; border-radius: 18px; background-size: contain; background-repeat: no-repeat; background-position: center; background-origin: content-box; padding: 18px; box-sizing: border-box; backface-visibility: hidden; }

        .black .cube-face { background-color: #222; background-image: radial-gradient(circle at 35% 35%, #2a2a2a 0%, #000 100%); box-shadow: 0 2px 4px rgba(255,255,255,0.12), inset 0 0 18px rgba(0,0,0,1); border: 1px solid #777; }
        .green .cube-face { background-color: #1a3c2a; background-image: radial-gradient(circle at 35% 35%, var(--bright-green) 0%, #0a1811 100%); box-shadow: inset 0 0 12px rgba(0,0,0,0.8); border: 1.5px solid rgba(255,255,255,0.12); }

        .front  { transform: rotateY(0deg) translateZ(41px); }
        .back   { transform: rotateY(180deg) translateZ(41px); }
        .right  { transform: rotateY(90deg) translateZ(41px); }
        .left   { transform: rotateY(-90deg) translateZ(41px); }
        .top    { transform: rotateX(90deg) translateZ(41px); }
        .bottom { transform: rotateX(-90deg) translateZ(41px); }

        .rolling { animation: tumble 0.7s linear infinite; }
        @keyframes tumble { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg); } }

        #rollBtn {
            min-width: 240px; height: 74px; background: linear-gradient(#2d4d3f, #122b21);
            border: 2px solid var(--border-gold); border-radius: 4px; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.8); padding: 8px;
        }

        .rollBtn-text { font-family: 'MedievalSharp', serif; font-size: 20px; color: var(--accent); letter-spacing: 1px; }

        #resetBtn { width: 32px; height: 32px; background: #111; color: var(--border-gold); border: 2px solid var(--border-gold); border-radius: 4px; cursor: pointer; font-family: 'MedievalSharp'; font-size: 1.1em; display: flex; align-items: center; justify-content: center; margin-top: 7px; }

        .report {
            display: flex; width: 100%; max-width: 500px; gap: 10px; font-family: 'MedievalSharp'; text-transform: uppercase; 
			background: rgba(69, 90, 100, 0.25) !important;
			padding: 12px 25px;
            border-radius: 60px; border: 1px solid #333; backdrop-filter: blur(8px);
        }
        .report > div { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .report-label-row { display: flex; align-items: center; gap: 6px; font-size: .85em; }
        .report-icon { width: 22px; height: 22px; }
        .report-icon img { width: 100%; height: 100%; object-fit: contain; }
		.succ{color:#ffcf67;}
		.elde{color:#27ae60;}
		.report{color:#e74c3c;}
        .succ img { filter: sepia(1) saturate(5) hue-rotate(-15deg); }
        .elde img { filter: sepia(1) saturate(5) hue-rotate(90deg); }
        .report span[id*="res"] { font-weight: bold; font-size: 2.4em; line-height: 1; }
        .report-label-row.succ, span#resSuccess { color: var(--succ-color); }
        .report-label-row.tent, span#resTentacle { color: var(--tent-color); }
        .report-label-row.elde, span#resElder { color: var(--elde-color); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 10, .25); border-top: 1px solid #333; display: flex; justify-content: center; padding: 15px 0; backdrop-filter: blur(10px); z-index: 100; }
    </style>
</head>
<body>

    <div class="investigator-bar" id="charBar"></div>

    <div class="controls">
        <div class="die-counter">
            <div class="type-icon" style="background-image: url('assets/dice/icon-black-dice.png');"></div>
            <button class="btn-circle-black" onclick="updateCount('black', -1)">−</button>
            <span id="blackCount">3</span>
            <button class="btn-circle-black" onclick="updateCount('black', 1)">+</button>
        </div>
        <button id="resetBtn" title="Reset Active Character" onclick="resetActiveChar()">↺</button>
        <div class="die-counter">
            <div class="type-icon" style="background-image: url('assets/dice/icon-green-dice.png');"></div>
            <button class="btn-circle-green" onclick="updateCount('green', -1)">−</button>
            <span id="greenCount">0</span>
            <button class="btn-circle-green" onclick="updateCount('green', 1)">+</button>
        </div>
    </div>

    <div class="dice-tray" id="diceContainer"></div>

    <div class="action-area" style="display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%;">
        <button id="rollBtn" onclick="rollAll()">
            <div style="display: flex; gap: 8px;">
                <img src="assets/dice/icon-black-dice.png" style="width:30px;">
                <img src="assets/dice/icon-green-dice.png" id="greenRollIcon" style="width:30px; display: none;">
            </div>
            <span class="rollBtn-text">Roll Dice</span>
        </button>

        <div class="report">
            <div class="succ">
                <div class="report-label-row">
                    <div class="report-icon"><img src="assets/dice/success-white.svg"></div>
                    <span>SUCCESS</span>
                </div>
                <span id="resSuccess">0</span>
            </div>
            <div class="tent">
                <div class="report-label-row">
                    <div class="report-icon"><img src="assets/dice/tentacle-white.svg"></div>
                    <span>INSANITY</span>
                </div>
                <span id="resTentacle">0</span>
            </div>
            <div class="elde">
                <div class="report-label-row">
                    <div class="report-icon"><img src="assets/dice/elder-white.svg"></div>
                    <span>ELDER</span>
                </div>
                <span id="resElder">0</span>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="location.reload()" style="color:#666; font-family:'MedievalSharp'; cursor:pointer; text-transform:uppercase;">Reload App</div>
    </div>

    <script>
        let investigators = JSON.parse(localStorage.getItem('cdmd_investigators')) || [
            { name: "Investigator 1", black: 3, green: 0 },
            { name: "Investigator 2", black: 3, green: 0 }
        ];
        let activeIdx = 0;
        let counts = { black: 3, green: 0 };
        let results = []; 
        const rollSound = new Audio('assets/dice.mp3');

        const faceFiles = { success: 'success-white.svg', tentacle: 'tentacle-white.svg', both: 'success-tentacle-white.svg', elder: 'elder-white.svg', blank: '' };
        const blackPool = ['both', 'elder', 'success', 'success', 'tentacle', 'blank'];
        const greenPool = ['both', 'elder', 'success', 'blank', 'success', 'blank'];

		function renderTabs() {
			const bar = document.getElementById('charBar');
			bar.innerHTML = '';
			investigators.forEach((char, i) => {
				const btn = document.createElement('button');
				btn.className = `char-tab ${i === activeIdx ? 'active' : ''}`;
				btn.innerText = char.name;
				btn.onclick = () => selectChar(i);

				// --- IPAD/MOBILE FRIENDLY MENU ---
				let timer;
				const handleMenu = (e) => {
					if (e) e.preventDefault();
					
					// Step 1: Check for Delete
					const wantDelete = confirm(`INVESTIGATOR: ${char.name}\n\nClick "OK" to DELETE this character.\nClick "Cancel" to RENAME instead.`);
					
					if (wantDelete) {
						if (investigators.length > 1) {
							investigators.splice(i, 1);
							activeIdx = 0;
							save();
							selectChar(0);
						} else {
							alert("You must have at least one investigator.");
						}
					} else {
						// Step 2: If they didn't delete, offer Rename
						const newName = prompt("Enter new name:", char.name);
						if (newName && newName !== char.name) {
							char.name = newName;
							save();
							renderTabs();
						}
					}
				};

				btn.ontouchstart = () => { timer = setTimeout(handleMenu, 600); };
				btn.ontouchend = () => clearTimeout(timer);
				btn.oncontextmenu = handleMenu;

				bar.appendChild(btn);
			});

			const add = document.createElement('button');
			add.className = 'add-char';
			add.innerText = '+ New';
			add.onclick = () => {
				const n = prompt("Investigator Name:");
				if(n) { 
					investigators.push({name:n, black:3, green:0}); 
					save();
					selectChar(investigators.length-1); 
				}
			};
			bar.appendChild(add);
		}

        function selectChar(i) {
            activeIdx = i;
            counts.black = investigators[i].black;
            counts.green = investigators[i].green;
            document.getElementById('blackCount').innerText = counts.black;
            document.getElementById('greenCount').innerText = counts.green;
            const greenIcon = document.getElementById('greenRollIcon');
            if (greenIcon) greenIcon.style.display = counts.green > 0 ? 'block' : 'none';
            renderTabs();
            renderDice();
        }

        function updateCount(type, delta) {
            counts[type] = Math.max(0, Math.min(10, counts[type] + delta));
            investigators[activeIdx][type] = counts[type];
            document.getElementById(type + 'Count').innerText = counts[type];
            const greenIcon = document.getElementById('greenRollIcon');
            if (greenIcon) greenIcon.style.display = counts.green > 0 ? 'block' : 'none';
            save();
            renderDice();
        }

        function resetActiveChar() {
            updateCount('black', 3 - counts.black);
            updateCount('green', -counts.green);
        }

        function save() { localStorage.setItem('cdmd_investigators', JSON.stringify(investigators)); }

        function renderDice() {
            const container = document.getElementById('diceContainer');
            container.innerHTML = '';
            results = []; 
            ['black', 'green'].forEach(color => {
                const pool = color === 'black' ? blackPool : greenPool;
                for(let i=0; i<counts[color]; i++) {
                    const id = results.length;
                    results.push('blank'); 
                    container.innerHTML += `<div class="die-scene ${color}" onclick="toggleHold(this)" data-id="${id}"><div class="cube"><div class="cube-face front" style="background-image: url('assets/dice/${faceFiles[pool[0]]}')"></div><div class="cube-face back" style="background-image: url('assets/dice/${faceFiles[pool[1]]}')"></div><div class="cube-face right" style="background-image: url('assets/dice/${faceFiles[pool[2]]}')"></div><div class="cube-face left" style="background-image: url('assets/dice/${faceFiles[pool[3]]}')"></div><div class="cube-face top" style="background-image: url('assets/dice/${faceFiles[pool[4]]}')"></div><div class="cube-face bottom" style="background-image: url('assets/dice/${faceFiles[pool[5]]}')"></div></div></div>`;
                }
            });
            updateReport();
        }

        function rollAll() {
            const scenes = document.querySelectorAll('.die-scene');
            let rollingAny = false;
            scenes.forEach(scene => {
                if (scene.classList.contains('held')) return;
                rollingAny = true;
                const cube = scene.querySelector('.cube');
                cube.classList.add('rolling');
                const isBlack = scene.classList.contains('black');
                const pool = isBlack ? blackPool : greenPool;
                const resultIdx = Math.floor(Math.random() * 6);
                results[scene.dataset.id] = pool[resultIdx];
                const rotations = ['rotateY(0deg)', 'rotateY(180deg)', 'rotateY(-90deg)', 'rotateY(90deg)', 'rotateX(-90deg)', 'rotateX(90deg)'];
                setTimeout(() => {
                    cube.classList.remove('rolling');
                    cube.style.transform = rotations[resultIdx];
                    updateReport();
                }, 700);
            });
            if (rollingAny) { rollSound.currentTime = 0; rollSound.play().catch(()=>{}); }
        }

        function updateReport() {
            let s = 0, t = 0, e = 0;
            results.forEach(res => {
                if (res === 'success') s++;
                if (res === 'tentacle') t++;
                if (res === 'elder') e++;
                if (res === 'both') { s++; t++; }
            });
            document.getElementById('resSuccess').innerText = s;
            document.getElementById('resTentacle').innerText = t;
            document.getElementById('resElder').innerText = e;
        }

        function toggleHold(el) { el.classList.toggle('held'); }

        // Initialize
        renderTabs();
        selectChar(0);
    </script>
</body>
</html>
